schema_version = "1.1"

[task]
name = "labelbox/planar-snake-gate-navigation"
description = "Write a deterministic MuJoCo planar snake policy that threads an articulated body through hidden gate sequences while avoiding no-go regions."

[environment]
cpus = 4
memory_mb = 8192
storage_mb = 10000
gpus = 0
gpu_types = []
allow_internet = false

[agent]
timeout_sec = 1800

[verifier]
timeout_sec = 600
env = []

[difficulty]
task_type = "mujoco"
domain = "robotics"

[ground_truth]
render_command = "bash solution/render.sh"
render_outputs = [
  { path = "/tmp/output/rendering.mp4", required = true, description = "Reviewer video of the oracle snake threading hidden-style gates" },
]

[[outputs]]
path = "/tmp/output/policy.py"
required = true
description = "Python policy module exposing act(obs), get_action(obs), or Policy.act(obs)"

[[outputs]]
path = "/tmp/output/README.md"
required = false
description = "Optional notes about the solution approach"
