schema_version = "1.1"

[task]
name = "labelbox/underwater-glider-thermocline-tracking"
description = "Write a deterministic MuJoCo policy that pilots an underwater glider through thermocline sampling windows under hidden ocean-current perturbations."

[environment]
cpus = 4
memory_mb = 8192
storage_mb = 10000
gpus = 0
gpu_types = []
allow_internet = false

[agent]
timeout_sec = 1800

[verifier]
timeout_sec = 600
env = []

[difficulty]
task_type = "mujoco"
domain = "robotics"

[ground_truth]
render_command = "bash solution/render.sh"
render_outputs = [
  { path = "/tmp/output/rendering.mp4", required = true, description = "Reviewer video of the oracle underwater glider tracking the thermocline transect" },
]

[[outputs]]
path = "/tmp/output/policy.py"
required = true
description = "Python policy module exposing act(obs), get_action(obs), or Policy.act(obs)"

[[outputs]]
path = "/tmp/output/README.md"
required = false
description = "Optional notes about the solution approach"
